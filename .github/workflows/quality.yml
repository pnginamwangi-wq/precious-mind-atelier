name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, contrast, visual
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Typecheck
        run: bunx tsgo --noEmit

      - name: Static readability guard
        run: bun test tests/no-handrolled-overlays.test.ts

      - name: Build (dev mode, for preview server)
        run: bun run build:dev

      - name: Start preview server
        run: |
          bun run dev > /tmp/vite.log 2>&1 &
          echo $! > /tmp/vite.pid
          # Wait up to 60s for port 8080.
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080 > /dev/null; then
              echo "Preview server ready"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server failed to start"
          cat /tmp/vite.log
          exit 1

      - name: Axe contrast scan
        run: bunx playwright test tests/media-overlay-contrast.spec.ts --reporter=line

      - name: Console-clean scan
        run: bunx playwright test tests/console-clean.spec.ts --reporter=line

      - name: Visual regression (MediaOverlay heroes)
        run: bunx playwright test tests/media-hero-visual.spec.ts --reporter=line

      - name: Editorial visual regression
        run: bunx playwright test tests/editorial-visual.spec.ts --reporter=line

      - name: Visual regression (Knowledge + Loupe Room readability)
        run: bunx playwright test tests/loupe-and-knowledge-visual.spec.ts --reporter=line

      - name: Upload Playwright artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results
            playwright-report
          retention-days: 7

      - name: Stop preview server
        if: always()
        run: |
          if [ -f /tmp/vite.pid ]; then
            kill "$(cat /tmp/vite.pid)" 2>/dev/null || true
          fi
