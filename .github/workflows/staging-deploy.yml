name: Staging deploy (Lovable preview)

# Lovable auto-syncs this repo into the project and rebuilds the preview URL
# on every push, so the preview IS the staging environment. This workflow adds
# a visible deploy signal: it waits for the preview to serve the new commit,
# then smoke-tests it and reports status back to the commit.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: staging-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  STAGING_URL: https://id-preview--368490b6-8d80-4a98-a114-379603e50fc7.lovable.app
  MAX_WAIT_SECONDS: "480"   # 8 minutes
  POLL_INTERVAL_SECONDS: "15"

jobs:
  wait-and-smoke-test:
    name: Verify staging picked up ${{ github.sha }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Mark commit as pending
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'pending',
              context: 'staging/lovable-preview',
              description: 'Waiting for Lovable to rebuild preview',
              target_url: process.env.STAGING_URL,
            });

      - name: Wait for preview to respond 200
        id: wait
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + MAX_WAIT_SECONDS ))
          attempt=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            attempt=$((attempt + 1))
            code=$(curl -s -o /tmp/body.html -w "%{http_code}" -L "$STAGING_URL" || echo "000")
            echo "attempt=$attempt http=$code"
            if [ "$code" = "200" ] && grep -qi "<html" /tmp/body.html; then
              echo "ok=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep "$POLL_INTERVAL_SECONDS"
          done
          echo "Staging did not return 200 within ${MAX_WAIT_SECONDS}s"
          exit 1

      - name: Smoke test key routes
        run: |
          set -euo pipefail
          fail=0
          for path in / /journal /library /knowledge; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L "${STAGING_URL}${path}")
            echo "GET ${path} -> ${code}"
            if [ "$code" != "200" ]; then fail=1; fi
          done
          exit $fail

      - name: Mark commit as success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'staging/lovable-preview',
              description: 'Staging is live and smoke tests passed',
              target_url: process.env.STAGING_URL,
            });

      - name: Mark commit as failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'staging/lovable-preview',
              description: 'Staging did not come up or smoke tests failed',
              target_url: process.env.STAGING_URL,
            });
